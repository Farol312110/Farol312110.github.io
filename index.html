<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>公寓异常管理集团 - 招聘</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f6f8;
  color: #222;
  transition: 0.5s;
}

header {
  background: #0d1b2a;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  padding: 40px;
  max-width: 800px;
  margin: auto;
}

.job-card {
  border: 1px solid #ddd;
  padding: 20px;
  margin-top: 20px;
  background: white;
}

button {
  padding: 10px 20px;
  background: #1b263b;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #415a77;
}

input {
  padding: 8px;
  margin-top: 10px;
  width: 200px;
}

.footer {
  margin-top: 80px;
  text-align: center;
  font-size: 12px;
  color: #666;
}

.hidden {
  display: none;
}

/* 异常效果 */
.corrupted {
  background-color: #0a0a0a;
  color: #ccc;
}

.glitch {
  animation: glitch 0.3s infinite;
}

@keyframes glitch {
  0% { transform: translate(0); }
  25% { transform: translate(-1px, 1px); }
  50% { transform: translate(1px, -1px); }
  75% { transform: translate(-1px, 0); }
  100% { transform: translate(0); }
}
</style>
</head>

<body>

<header>
  <h1 id="companyTitle">公寓异常管理集团</h1>
  <p id="slogan">致力于维护高质量居住秩序</p>
</header>

<div class="container" id="mainPage">
  <h2>招聘岗位：夜间管理员</h2>

  <div class="job-card">
    <p><strong>工作时间：</strong>21:00 - 06:00</p>
    <p><strong>岗位职责：</strong>遵守并执行夜间管理规则</p>
    <p><strong>要求：</strong>逻辑清晰，服从安排</p>
    <button onclick="showLogin()">员工登录</button>
  </div>
</div>

<div class="container hidden" id="loginPage">
  <h2>内部员工系统</h2>
  <p>请输入姓名与员工编码</p>

  <input type="text" id="playerName" placeholder="员工姓名">
  <br>

  <input type="text" id="playerCode" placeholder="员工编码（注册后获得）">
  <br>

  <button onclick="register()">注册新员工</button>
  <button onclick="login()">登录已有账号</button>
</div>

<div class="footer">
  © 2026 公寓异常管理集团 | Internal Recruitment Portal
</div>

<script type="module">

// ===== Firebase 引入 =====
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ===== 你的 firebaseConfig（替换成你自己的） =====
const firebaseConfig = {
  apiKey: "填你自己的",
  authDomain: "填你自己的",
  projectId: "填你自己的",
  storageBucket: "填你自己的",
  messagingSenderId: "填你自己的",
  appId: "填你自己的"
};

// 初始化
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ===== 工具函数 =====
function generateCode() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

// ===== 注册 =====
window.register = async function() {
  const name = document.getElementById("playerName").value.trim();
  if (!name) {
    alert("请输入姓名");
    return;
  }

  const code = generateCode();
  const id = name + "_" + code;

  await setDoc(doc(db, "players", id), {
    name: name,
    code: code,
    pollution: 0,
    trust: 0,
    night: 1,
    loop: 1,
    lastLogin: Date.now()
  });

  alert("注册成功！\n员工编码：" + code + "\n请记住它。");
};

// ===== 登录 =====
window.login = async function() {
  const name = document.getElementById("playerName").value.trim();
  const code = document.getElementById("playerCode").value.trim();

  if (!name || !code) {
    alert("请输入姓名和员工编码");
    return;
  }

  const id = name + "_" + code;
  const docRef = doc(db, "players", id);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();
    alert("欢迎回来，" + data.name);
    console.log("读取到数据：", data);
  } else {
    alert("员工不存在。");
  }
};

</script>

</body>
</html>
