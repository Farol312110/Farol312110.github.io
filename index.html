<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公寓异常管理集团 - 终端 v3.0</title>
    <style>
        /* ====== 诡异暗黑 UI ====== */
        body { margin: 0; font-family: 'Courier New', monospace; background-color: #050505; color: #d4d4d4; overflow-x: hidden; }
        header { background: #000; color: #8b0000; padding: 20px; text-align: center; border-bottom: 2px solid #333; }
        .container { padding: 40px; max-width: 500px; margin: 40px auto; background: #111; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { padding: 12px; margin-top: 15px; width: calc(100% - 28px); background: #1a1a1a; color: #0f0; border: 1px solid #444; font-family: inherit; }
        button { padding: 12px; background: #1a1a1a; color: #e0e0e0; border: 1px solid #444; cursor: pointer; margin-top: 20px; font-family: inherit; width: 100%; transition: 0.3s; }
        button:hover { background: #8b0000; color: #fff; border-color: #ff4c4c; }
        .hidden { display: none; }
        .warning { color: #ff4500; font-weight: bold; }

        /* 欢迎仪式特效 */
        @keyframes shake {
            0% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-3px, -2px) rotate(-1deg); }
            40% { transform: translate(-1px, -1px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(-1deg); }
        }
        .glitch-welcome { animation: shake 0.1s infinite; color: #ff0000; font-size: 24px; text-align: center; }
        .ending-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="ui-wrapper">
    <header id="topHeader">
        <h1>公寓异常管理集团</h1>
        <p>>_ 实体档案校验中...</p>
    </header>

    <div class="container" id="loginPage">
        <h2>>_ 权限鉴权</h2>
        <input type="text" id="playerName" placeholder="员工姓名 (唯一标识)">
        <input type="password" id="playerPwd" placeholder="登录密码">
        <button onclick="register()">[ 1. 建立新档案 ]</button>
        <button onclick="login()">[ 2. 提取旧档案 ]</button>
    </div>

    <div id="gameUI"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // --- 请在此处填入你的 Supabase 配置 ---
    const supabaseUrl = "https://jfqgdcwwjjcopckvopug.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcWdkY3d3ampjb3Bja3ZvcHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTQzMDIsImV4cCI6MjA4NzkzMDMwMn0.95VTLUlRl_cPFWr6L6k8Gg3Qi4ZJhpHLXk0KqwUaelk";
    const client = supabase.createClient(supabaseUrl, supabaseKey);

    // --- 注册逻辑 (含灵魂质问) ---
    async function register() {
        const name = document.getElementById("playerName").value.trim();
        const nameLower = name.toLowerCase();

        // 开发者拦截
        if (nameLower === "farol" || nameLower === "farol312110") {
            return alert("【系统拦截】想屁吃呢，滚去干活！");
        }

        // 彩蛋拦截：Firebase / Supabase
        if (nameLower === "firebase" || nameLower === "supabase") {
            if (confirm(`【系统质问】\n检测到敏感标识符：“${name}”。\n你确定要以此身份进入公寓吗？此操作不可逆。`)) {
                const autoPwd = (nameLower === "firebase") ? "666666" : "999999";
                const autoCode = (nameLower === "firebase") ? "0666" : "0999";
                
                // 尝试插入，即使已存在也会因为 id 冲突报错，我们忽略它直接登录
                await client.from("players").insert([{
                    id: name + "_" + autoCode, name: name, code: autoCode, password: autoPwd, pollution: 0, loop: 1
                }]);
                
                document.getElementById("playerPwd").value = autoPwd;
                alert("【警告】系统已接管身份分配。强制登录中...");
                login();
                return;
            } else { return; }
        }

        const password = document.getElementById("playerPwd").value.trim();
        if (!name || !password) return alert("姓名和密码均为必填项。");

        // 普通查重
        const { data: existing } = await client.from("players").select("name").eq("name", name).single();
        if (existing) return alert("【拒绝】此员工已存在。别想滥竽充数！");

        const code = Math.floor(1000 + Math.random() * 9000).toString();
        const { error } = await client.from("players").insert([{
            id: name + "_" + code, name: name, code: code, password: password, pollution: 0, loop: 1
        }]);

        if (error) alert("录入失败: " + error.message);
        else alert(`建档成功！编号：${code}\n请牢记密码。`);
    }

    // --- 登录逻辑 (含惊吓欢迎) ---
    async function login() {
        const name = document.getElementById("playerName").value.trim();
        const password = document.getElementById("playerPwd").value.trim();
        const nameLower = name.toLowerCase();

        const { data, error } = await client.from("players").select("*").eq("name", name).eq("password", password).single();

        if (error || !data) return alert("鉴权失败。");

        // 1. 隐藏登录界面
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("topHeader").classList.add("hidden");

        // 2. 惊吓欢迎仪式
        const gameUI = document.getElementById("gameUI");
        if (nameLower === "firebase" || nameLower === "supabase") {
            gameUI.innerHTML = `<div class="glitch-welcome">欢 迎 回 来 :) <br> ${name.toUpperCase()} <br> 欢 迎 回 来 :)</div>`;
        } else {
            gameUI.innerHTML = `<div style="text-align:center; padding:50px;">欢迎回来，员工 ${name}。</div>`;
        }

        // 3. 延迟进入主系统
        setTimeout(() => {
            startSystem(data);
        }, 2000);
    }

    // --- 游戏主系统 ---
    function startSystem(data) {
        const nameLower = data.name.toLowerCase();
        let content = `<div class="container">
            <h2>监控室 - 管理员 [${data.name}]</h2>
            <p id="pDisplay">污染值：${data.pollution}</p><hr>`;

        if (nameLower === "firebase") {
            content += `<p class="warning">检测到非法持久化信号...</p>
                        <button onclick="triggerEnding()">修复并进入电梯</button>`;
        } else {
            content += `<button onclick="explore('${data.id}', ${data.pollution}, '${data.name}')">进入走廊巡视</button>`;
        }

        content += `</div>`;
        document.getElementById("gameUI").innerHTML = content;
    }

    function triggerEnding() {
        document.body.innerHTML = `<div class="ending-screen" style="background:#ff9800; color:#fff;">
            <h1>【结局：永恒的托管】</h1>
            <p>你成为了 Firebase 缓存的一部分。欢迎回家。</p>
        </div>`;
    }

    async function explore(id, pol, name) {
        let jump = (name.toLowerCase() === "supabase" ? 20 : 1);
        let newPol = pol + jump;
        await client.from("players").update({ pollution: newPol }).eq("id", id);
        document.getElementById("pDisplay").innerText = "当前污染值：" + newPol;

        if (newPol >= 60 && !["supabase", "firebase"].includes(name.toLowerCase())) {
            alert("【成就：深渊观测者】\n你直视了深渊。");
        }
    }
</script>
</body>
</html>
