<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公寓异常管理集团 - 内部终端</title>

<style>
/* ====== 诡异暗黑风 UI ====== */
body {
  margin: 0;
  font-family: 'Courier New', Courier, monospace; /* 终端字体增强代入感 */
  background-color: #050505;
  color: #d4d4d4;
  transition: background-color 0.5s, color 0.5s;
}

header {
  background: #000;
  color: #8b0000; /* 血液暗红 */
  padding: 20px;
  text-align: center;
  border-bottom: 2px solid #333;
  box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
}

.container {
  padding: 40px;
  max-width: 600px;
  margin: 40px auto;
  background: #111;
  border: 1px solid #333;
  box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
}

.job-card {
  border: 1px dashed #555;
  padding: 20px;
  margin-top: 20px;
  background: #0a0a0a;
}

.warning-text { color: #ff4500; font-weight: bold; }
.glitch-text { color: #ff9800; text-shadow: 2px 0 red, -2px 0 blue; }

button {
  padding: 10px 20px;
  background: #1a1a1a;
  color: #e0e0e0;
  border: 1px solid #444;
  cursor: pointer;
  margin-top: 15px;
  font-family: inherit;
  transition: 0.3s;
  width: 100%;
}

button:hover {
  background: #8b0000;
  color: #fff;
  border-color: #ff4c4c;
}

input {
  padding: 10px;
  margin-top: 10px;
  width: calc(100% - 24px);
  background: #222;
  color: #0f0; /* 终端绿 */
  border: 1px solid #444;
  font-family: inherit;
}

.footer {
  margin-top: 60px;
  text-align: center;
  font-size: 12px;
  color: #444;
}

.hidden { display: none; }

/* 结局满屏效果 */
.ending-screen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  text-align: center; z-index: 999; padding: 20px; box-sizing: border-box;
}

/* 欢迎动画 */
.welcome-overlay {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  color: #ff0;
  font-size: 48px;
  font-family: 'Courier New', monospace;
  text-shadow: 2px 2px 0 red, -2px -2px 0 blue;
  animation: glitch 0.3s infinite;
}

@keyframes glitch {
  0% { transform: skew(0deg); }
  20% { transform: skew(10deg); }
  40% { transform: skew(-10deg); }
  60% { transform: skew(5deg); }
  80% { transform: skew(-5deg); }
  100% { transform: skew(0deg); }
}
</style>
</head>

<body>

<header>
  <h1 id="mainTitle">公寓异常管理集团</h1>
  <p>System.out.println("秩序即生命");</p>
</header>

<div class="container" id="mainPage">
  <h2>招聘岗位：夜间管理员</h2>
  <div class="job-card">
    <p><strong>工作时间：</strong>21:00 - 06:00</p>
    <p><strong>岗位职责：</strong>绝对服从，不要回头</p>
    <p><strong>警告：</strong>请勿在系统内提及“那个名字”。</p>
    <button onclick="showLogin()">初始化员工终端</button>
  </div>
</div>

<div class="container hidden" id="loginPage">
  <h2>>_ 内部员工鉴权系统</h2>
  <input type="text" id="playerName" autocomplete="off" placeholder="输入真实姓名 (切勿使用代号)">
  <input type="password" id="playerPassword" autocomplete="off" placeholder="输入密码 (4-6位数字)">
  <input type="text" id="playerCode" autocomplete="off" placeholder="员工编号 (4位数字)">
  
  <button onclick="register()">[ 登记灵魂 ]</button>
  <button onclick="login()">[ 唤醒档案 ]</button>
  <button onclick="goHome()" style="background:#000; border:none; text-decoration:underline;">放弃入职</button>
</div>

<div id="gameUI"></div>

<div class="footer">
  © 2026 公寓异常管理集团 | RLS Policy: STRICT
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ===== 在这里填入你大获全胜的 Supabase 信息 =====
const supabaseUrl = "https://jfqgdcwwjjcopckvopug.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcWdkY3d3ampjb3Bja3ZvcHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTQzMDIsImV4cCI6MjA4NzkzMDMwMn0.95VTLUlRl_cPFWr6L6k8Gg3Qi4ZJhpHLXk0KqwUaelk";
const client = supabase.createClient(supabaseUrl, supabaseKey);

// ===== UI 切换 =====
function showLogin() {
  document.getElementById("mainPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

function goHome() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("mainPage").classList.remove("hidden");
}

function generateCode() { return Math.floor(1000 + Math.random() * 9000).toString(); }

// ===== 核心拦截器 (彩蛋 1) =====
function checkDeveloperEasterEgg(name) {
  const lower = name.toLowerCase();
  if (lower === "farol" || lower === "farol312110") {
    alert("【系统拦截】检测到开发者 ID 镜像……\n\n警告：这就想要开发者了？想屁吃呢，滚去干活！");
    return true;
  }
  return false;
}

// ===== 验证密码格式：4-6位数字 =====
function isValidPassword(pwd) {
  return /^\d{4,6}$/.test(pwd);
}

// ===== 注册 =====
async function register() {
  const name = document.getElementById("playerName").value.trim();
  const password = document.getElementById("playerPassword").value.trim();

  if (!name) return alert("姓名不可为空。");
  if (checkDeveloperEasterEgg(name)) return;

  if (!password) return alert("密码不可为空。");
  if (!isValidPassword(password)) {
    return alert("密码必须为 4-6 位数字。");
  }

  // 检查名字是否已存在（大小写不敏感）
  const { data: existing, error: queryError } = await client
    .from("players")
    .select("name")
    .ilike("name", name);

  if (queryError) {
    return alert("系统错误，无法验证身份：" + queryError.message);
  }
  if (existing && existing.length > 0) {
    return alert("⚠️ 此员工已存在！\n别想滥竽充数！");
  }

  const code = generateCode();
  const id = name + "_" + code;

  const { error: insertError } = await client.from("players").insert([{
    id: id,
    name: name,
    password: password,
    code: code,
    pollution: 0,
    loop: 1,
    last_login: Date.now()
  }]);

  if (insertError) {
    alert("档案录入失败，实体被拒绝：" + insertError.message);
  } else {
    alert(`录入成功。您的唯一编码是：[${code}]\n请将其刻在脑子里。\n登录时需输入此编号和密码。`);
    document.getElementById("playerPassword").value = ""; // 清空密码
    document.getElementById("playerCode").value = "";     // 清空编号（让用户手动输入）
  }
}

// ===== 欢迎动画 =====
function showWelcomeBack(name) {
  return new Promise(resolve => {
    const overlay = document.createElement('div');
    overlay.className = 'welcome-overlay';
    overlay.innerText = `欢迎回来，${name}`;
    document.body.appendChild(overlay);
    setTimeout(() => {
      overlay.remove();
      resolve();
    }, 2000); // 显示2秒
  });
}

// ===== 核心登录逻辑（不包含UI交互） =====
async function performLogin(name, password, code) {
  if (!name || !password || !code) {
    alert("姓名、密码和员工编号不可为空。");
    return;
  }

  const { data, error } = await client
    .from("players")
    .select("*")
    .ilike("name", name)
    .eq("password", password)
    .eq("code", code);

  if (error || !data || data.length === 0) {
    alert("抱歉，查无此人。或者……你真的存在过吗？：）");
    return;
  }

  const user = data[0];
  await client.from("players").update({ loop: user.loop + 1, last_login: Date.now() }).eq("id", user.id);

  document.getElementById("loginPage").classList.add("hidden");
  document.querySelector("header").classList.add("hidden");
  document.querySelector(".footer").classList.add("hidden");

  startSystem(user, user.id);
}

// ===== 登录（包含特殊名字处理） =====
async function login() {
  const name = document.getElementById("playerName").value.trim();
  const password = document.getElementById("playerPassword").value.trim();
  const code = document.getElementById("playerCode").value.trim();

  if (!name || !password || !code) return alert("姓名、密码和员工编号不可为空。");
  if (checkDeveloperEasterEgg(name)) return;

  const lowerName = name.toLowerCase();
  if (lowerName === "firebase" || lowerName === "supabase") {
    const presetPassword = lowerName === "firebase" ? "6666" : "9999";
    const presetCode = lowerName === "firebase" ? "0001" : "0002";

    // 如果已经输入了正确的预设值，直接登录（避免重复询问）
    if (password === presetPassword && code === presetCode) {
      await performLogin(name, password, code);
    } else {
      const confirmMsg = `你确定要选择“${name}”这个名字吗？这将使用预设的员工编号和密码进入特殊剧情。`;
      if (confirm(confirmMsg)) {
        // 自动填充
        document.getElementById("playerPassword").value = presetPassword;
        document.getElementById("playerCode").value = presetCode;
        // 显示扭曲欢迎动画
        await showWelcomeBack(name);
        // 执行登录
        await performLogin(name, presetPassword, presetCode);
      }
      // 用户取消，什么都不做
    }
  } else {
    // 普通登录
    await performLogin(name, password, code);
  }
}

// ===== 游戏主系统 (完全保留原有逻辑) =====
function startSystem(data, id) {
  const nameLower = data.name.toLowerCase();
  let content = `<div class="container">
    <h2>监控室 - 档案柜 #${data.loop}</h2>
    <p>管理员：<span style="color:#0f0">${data.name}</span></p>
    <p>当前污染值：${data.pollution}</p><hr>`;

  // 彩蛋 2：Firebase 的诅咒
  if (nameLower === "firebase") {
    content += `
      <p class="warning-text">检测到底层架构残留响应...</p>
      <p>监控室的角落出现了一部不属于这里的电梯。面板上用胶带贴着歪歪扭扭的字迹：“Supabase (故障中)”。</p>
      <button onclick="fixElevator('${id}')">尝试重置电梯逻辑</button>
    `;
  } 
  // 彩蛋 3：Supabase 的凝视
  else if (nameLower === "supabase") {
    content += `
      <p class="glitch-text">【警告】你感觉背后有一双橙色的眼睛正在注视你的数据库。</p>
      <button onclick="enterHallway('${id}', ${data.pollution}, true)">去走廊巡视</button>
    `;
  } 
  // 正常流程
  else {
    content += `<button onclick="enterHallway('${id}', ${data.pollution}, false)">去走廊巡视</button>`;
  }

  content += `</div>`;
  document.getElementById("gameUI").innerHTML = content;
}

// ===== 剧情分支：修电梯 (Firebase 路线) =====
function fixElevator(id) {
  document.getElementById("gameUI").innerHTML = `
    <div class="ending-screen" style="background-color: #ff9800; color: #fff;">
      <h1 style="color: #fff; text-shadow: 2px 2px 4px #000;">【BAD ENDING: 永恒的托管】</h1>
      <p style="max-width: 600px; font-size: 18px; line-height: 1.6;">
        你接通了最后的电线，电梯发出悦耳的蜂鸣声。门缓缓打开。<br><br>
        但在你踏入的瞬间，面板上的 'Supabase' 胶带脱落了，露出了底部散发着橙色幽光的 <strong>Firebase</strong> 标志。<br><br>
        “系统已强行接管。正在同步您的意识至 us-central1 节点... 同步完成。”<br>
        你再也无法返回首页，因为你已成为缓存的一部分。
      </p>
    </div>
  `;
  document.body.style.overflow = 'hidden'; 
}

// ===== 剧情分支：走廊巡视 (Supabase 路线 & 正常路线) =====
async function enterHallway(id, pollution, isHaunted) {
  let jumpValue = isHaunted ? 20 : 1;
  let newPollution = pollution + jumpValue;

  await client.from("players").update({ pollution: newPollution }).eq("id", id);

  if (isHaunted && newPollution >= 50) {
    document.getElementById("gameUI").innerHTML = `
      <div class="container" style="border-color: red; animation: shake 0.5s infinite;">
        <h2 style="color: red;">⚠️ 紧急脱离协议 ⚠️</h2>
        <p>那个名为 Firebase 的影子从服务器机柜后扑向了你！它的控制欲让你的 RLS 策略全线崩溃！</p>
        <p>污染值已达 ${newPollution}！</p>
        <button onclick="chaseResult('die')" style="background: red;">闭上眼睛接受同化</button>
        <button onclick="chaseResult('survive')" style="background: #0f0; color: #000;">注入强制 DELETE 语句反抗！</button>
      </div>
      <style>@keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 100% { transform: translate(-1px, -2px) rotate(-1deg); } }</style>
    `;
    return;
  }

  document.getElementById("gameUI").innerHTML = `
    <div class="container">
      <h2>幽暗的走廊</h2>
      <p>头顶的灯管发出滋滋的声音。</p>
      ${isHaunted ? '<p class="warning-text">身后的脚步声越来越近了……它的同步延迟极低。</p>' : '<p>一切似乎符合规则。</p>'}
      <p>当前污染值：${newPollution}</p>
      <button onclick="location.reload()">退回监控室 (刷新页面)</button>
    </div>
  `;
}

// ===== 追逐战结算 =====
function chaseResult(result) {
  if (result === 'die') {
    document.getElementById("gameUI").innerHTML = `
      <div class="ending-screen" style="background-color: #8b0000; color: #fff;">
        <h1>【BAD ENDING: 冒名顶替】</h1>
        <p style="max-width: 600px;">
          影子抓住了你，你终于看清了对方，它是上一届管理员“Firebase”它夺走了你的 JWT 令牌，并锁死了你的管理员账号。<br><br>
          它戴上了你的工牌，现在，它才是合法的 Supabase 进程。而你，只是一个被彻底遗忘的 404 错误……：)
        </p>
      </div>
    `;
  } else {
    document.getElementById("gameUI").innerHTML = `
      <div class="ending-screen" style="background-color: #e0f7fa; color: #006064; font-family: monospace;">
        <h1>【TRUE ENDING: 架构主宰】</h1>
        <p style="max-width: 600px;">
          你咬破指尖，在控制台上敲下了一记完美的 <code>DROP TABLE firebase_ghosts;</code><br><br>
          那个影子在一阵红色的报错代码中灰飞烟灭……服务器恢复了宁静的蓝色指示灯。<br><br>
          系统提示：[ADMIN PRIVILEGES GRANTED]。欢迎回来，夜间的管理员，Supabase。
        </p>
      </div>
    `;
  }
}

</script>
</body>
</html>
