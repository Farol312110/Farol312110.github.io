<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>公寓异常管理集团 - 招聘</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f6f8;
  color: #222;
  transition: 0.5s;
}

header {
  background: #0d1b2a;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  padding: 40px;
  max-width: 800px;
  margin: auto;
}

.job-card {
  border: 1px solid #ddd;
  padding: 20px;
  margin-top: 20px;
  background: white;
}

button {
  padding: 10px 20px;
  background: #1b263b;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #415a77;
}

input {
  padding: 8px;
  margin-top: 10px;
  width: 220px;
}

.footer {
  margin-top: 80px;
  text-align: center;
  font-size: 12px;
  color: #666;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<header>
  <h1>公寓异常管理集团</h1>
  <p>致力于维护高质量居住秩序</p>
</header>

<div class="container" id="mainPage">
  <h2>招聘岗位：夜间管理员</h2>
  <div class="job-card">
    <p><strong>工作时间：</strong>21:00 - 06:00</p>
    <p><strong>岗位职责：</strong>遵守并执行夜间管理规则</p>
    <p><strong>要求：</strong>逻辑清晰，服从安排</p>
    <button onclick="showLogin()">员工登录</button>
  </div>
</div>

<div class="container hidden" id="loginPage">
  <h2>内部员工系统</h2>

  <input type="text" id="playerName" placeholder="员工姓名">
  <br>

  <input type="text" id="playerCode" placeholder="员工编码（注册后获得）">
  <br>

  <button onclick="register()">注册新员工</button>
  <button onclick="login()">登录已有账号</button>

  <br><br>
  <button onclick="goHome()">返回首页</button>
</div>

<div class="footer">
  © 2026 公寓异常管理集团 | Internal Recruitment Portal
</div>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ===== 在这里填入你的 Supabase 信息 =====
const supabaseUrl = "https://jfqgdcwwjjcopckvopug.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmcWdkY3d3ampjb3Bja3ZvcHVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNTQzMDIsImV4cCI6MjA4NzkzMDMwMn0.95VTLUlRl_cPFWr6L6k8Gg3Qi4ZJhpHLXk0KqwUaelk";

const client = supabase.createClient(supabaseUrl, supabaseKey);

// ===== 页面切换 =====
function showLogin() {
  document.getElementById("mainPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
}

function goHome() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("mainPage").classList.remove("hidden");
}

// ===== 工具函数 =====
function generateCode() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

// ===== 注册 =====
async function register() {

  const name = document.getElementById("playerName").value.trim();

  if (!name) {
    alert("请输入姓名");
    return;
  }

  const code = generateCode();
  const id = name + "_" + code;

  const { error } = await client
    .from("players")
    .insert([{
      id: id,
      name: name,
      code: code,
      pollution: 0,
      trust: 0,
      night: 1,
      loop: 1,
      last_login: Date.now()
    }]);

  if (error) {
    alert("注册失败：" + error.message);
  } else {
    alert("注册成功！\n员工编码：" + code + "\n请务必记住。");
  }
}

// ===== 登录 =====
async function login() {

  const name = document.getElementById("playerName").value.trim();
  const code = document.getElementById("playerCode").value.trim();

  if (!name || !code) {
    alert("请输入姓名和员工编码");
    return;
  }

  const id = name + "_" + code;

  const { data, error } = await client
    .from("players")
    .select("*")
    .eq("id", id)
    .single();

  if (error || !data) {
    alert("员工不存在");
    return;
  }

  // 更新登录信息
  await client
    .from("players")
    .update({
      loop: data.loop + 1,
      last_login: Date.now()
    })
    .eq("id", id);

  startSystem(data, id);
}

// ===== 游戏入口 =====
function startSystem(data, id) {

  document.body.innerHTML = `
    <div style="padding:40px;">
      <h2>欢迎回来，${data.name}</h2>
      <p>当前污染值：${data.pollution}</p>
      <p>当前周目：${data.loop}</p>
      <br>
      <button onclick="enterHallway('${id}', ${data.pollution})">进入走廊</button>
    </div>
  `;
}

// ===== 简易事件 =====
async function enterHallway(id, pollution) {

  pollution += 1;

  await client
    .from("players")
    .update({ pollution: pollution })
    .eq("id", id);

  document.body.innerHTML = `
    <div style="padding:40px;">
      <h2>走廊</h2>
      <p>灯全部亮起。</p>
      <p>远处传来奔跑声。</p>
      <p>当前污染值：${pollution}</p>
      <br>
      <button onclick="location.reload()">返回首页</button>
    </div>
  `;
}

</script>

</body>
</html>
