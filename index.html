<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>公寓异常管理集团 - 招聘</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f4f6f8;
  color: #222;
  transition: 0.5s;
}

header {
  background: #0d1b2a;
  color: white;
  padding: 20px;
  text-align: center;
}

.container {
  padding: 40px;
  max-width: 800px;
  margin: auto;
}

.job-card {
  border: 1px solid #ddd;
  padding: 20px;
  margin-top: 20px;
  background: white;
}

button {
  padding: 10px 20px;
  background: #1b263b;
  color: white;
  border: none;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #415a77;
}

input {
  padding: 8px;
  margin-top: 10px;
  width: 220px;
}

.footer {
  margin-top: 80px;
  text-align: center;
  font-size: 12px;
  color: #666;
}

.hidden {
  display: none;
}

.corrupted {
  background-color: #0a0a0a;
  color: #ccc;
}
</style>
</head>

<body>

<header>
  <h1>公寓异常管理集团</h1>
  <p>致力于维护高质量居住秩序</p>
</header>

<div class="container" id="mainPage">
  <h2>招聘岗位：夜间管理员</h2>
  <div class="job-card">
    <p><strong>工作时间：</strong>21:00 - 06:00</p>
    <p><strong>岗位职责：</strong>遵守并执行夜间管理规则</p>
    <p><strong>要求：</strong>逻辑清晰，服从安排</p>
    <button onclick="showLogin()">员工登录</button>
  </div>
</div>

<div class="container hidden" id="loginPage">
  <h2>内部员工系统</h2>

  <input type="text" id="playerName" placeholder="员工姓名">
  <br>

  <input type="text" id="playerCode" placeholder="员工编码（注册后获得）">
  <br>

  <button onclick="register()">注册新员工</button>
  <button onclick="login()">登录已有账号</button>

  <br><br>
  <button onclick="goHome()">返回首页</button>
</div>

<div class="footer">
  © 2026 公寓异常管理集团 | Internal Recruitment Portal
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5szvUkWlixf507iZeGLEs7Poq1rueNDw",
  authDomain: "apartment-system-c16be.firebaseapp.com",
  projectId: "apartment-system-c16be",
  storageBucket: "apartment-system-c16be.firebasestorage.app",
  messagingSenderId: "745250696109",
  appId: "1:745250696109:web:02e447f0e0e1bfb82ecf24"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function generateCode() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

window.showLogin = function() {
  document.getElementById("mainPage").classList.add("hidden");
  document.getElementById("loginPage").classList.remove("hidden");
};

window.goHome = function() {
  document.getElementById("loginPage").classList.add("hidden");
  document.getElementById("mainPage").classList.remove("hidden");
};

window.register = async function() {

  const name = document.getElementById("playerName").value.trim();
  if (!name) {
    alert("请输入姓名");
    return;
  }

  const code = generateCode();
  const id = name + "_" + code;

  await setDoc(doc(db, "players", id), {
    name: name,
    code: code,
    pollution: 0,
    trust: 0,
    night: 1,
    loop: 1,
    lastLogin: Date.now()
  });

  alert("注册成功！\n员工编码：" + code + "\n请务必记住。");
};

window.login = async function() {

  const name = document.getElementById("playerName").value.trim();
  const code = document.getElementById("playerCode").value.trim();

  if (!name || !code) {
    alert("请输入姓名和员工编码");
    return;
  }

  const id = name + "_" + code;
  const ref = doc(db, "players", id);
  const snap = await getDoc(ref);

  if (!snap.exists()) {
    alert("员工不存在。");
    return;
  }

  const data = snap.data();

  await updateDoc(ref, {
    loop: data.loop + 1,
    lastLogin: Date.now()
  });

  startSystem(data.name, data.pollution, id);
};

function startSystem(name, pollution, id) {

  document.body.innerHTML = `
  <div style="padding:40px;">
    <h2>欢迎回来，${name}</h2>
    <p>夜间管理系统已激活。</p>
    <p>当前污染值：${pollution}</p>
    <br>
    <button onclick="enterHallway('${id}', ${pollution})">进入走廊</button>
  </div>
  `;
}

window.enterHallway = async function(id, pollution) {

  pollution += 1;

  const ref = doc(db, "players", id);
  await updateDoc(ref, {
    pollution: pollution
  });

  document.body.innerHTML = `
  <div style="padding:40px;">
    <h2>走廊</h2>
    <p>灯全部亮起。</p>
    <p>远处传来奔跑声。</p>
    <p>当前污染值：${pollution}</p>
    <br>
    <button onclick="location.reload()">返回首页</button>
  </div>
  `;
};

</script>

</body>
</html>
